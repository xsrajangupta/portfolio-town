<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Portfolio Town — Interactive Portfolio</title>
  <meta name="description" content="An interactive pixel-art portfolio town built with Phaser 3." />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app-root">
    <div id="game-container" aria-label="Interactive portfolio game canvas"></div>

    <!-- Settings / mute button -->
    <button id="settings-btn" class="settings-btn" aria-label="Toggle sound">🔊</button>

    <!-- Fixed on-screen hint shown when standing near a building or NPC -->
    <div id="interact-hint" class="interact-hint hidden">
      <kbd>E</kbd><span id="interact-hint-label">Interact</span>
    </div>

    <!-- NPC dialogue box -->
    <div id="dialogue-overlay" class="dialogue-overlay hidden" role="dialog" aria-modal="true">
      <div class="dialogue-box">
        <div class="dialogue-portrait">🧙</div>
        <div class="dialogue-content">
          <div id="dialogue-name" class="dialogue-name"></div>
          <div id="dialogue-text" class="dialogue-text"></div>
          <div class="dialogue-continue">Press <kbd>E</kbd> or click to continue</div>
        </div>
      </div>
    </div>

    <!-- Content overlay: reusable panel populated per building/section -->
    <div id="content-overlay" class="content-overlay hidden" role="dialog" aria-modal="true">
      <div class="content-panel">
        <button id="content-close" class="content-close" aria-label="Close">×</button>
        <div id="content-header" class="content-header"></div>
        <div id="content-body" class="content-body"></div>
      </div>
    </div>

    <!-- Lightbox for certification / project detail popups -->
    <div id="lightbox-overlay" class="lightbox-overlay hidden">
      <div class="lightbox-box">
        <button id="lightbox-close" class="content-close" aria-label="Close">×</button>
        <div id="lightbox-body"></div>
      </div>
    </div>

    <!-- Mobile on-screen controls -->
    <div id="touch-controls" class="touch-controls hidden">
      <div class="dpad">
        <button data-dir="up" class="dpad-btn dpad-up" aria-label="Move up">▲</button>
        <button data-dir="left" class="dpad-btn dpad-left" aria-label="Move left">◀</button>
        <button data-dir="down" class="dpad-btn dpad-down" aria-label="Move down">▼</button>
        <button data-dir="right" class="dpad-btn dpad-right" aria-label="Move right">▶</button>
      </div>
      <button id="touch-interact" class="touch-interact" aria-label="Interact">E</button>
    </div>

    <div id="loading-screen" class="loading-screen">
      <div class="loading-box">
        <div class="loading-title">Portfolio Town</div>
        <div class="loading-bar-track"><div id="loading-bar-fill" class="loading-bar-fill"></div></div>
        <div class="loading-tip">Use WASD / Arrow keys to move · E to interact</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
